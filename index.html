<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js 작품 모음</title>

    <style>
        /* 전체 페이지 */
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f8fafc;
            color: #1f2937;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 헤더 */
        header {
            text-align: center;
            margin-bottom: 45px;
        }

        header h1 {
            color: #111827;
            font-size: 2.6rem;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            color: #6b7280;
            font-size: 1.1rem;
            margin: 0;
        }

        /* 작품 그리드 */
        #projects {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 32px;
            max-width: 1400px;
            width: 100%;
        }

        /* 작품 카드 */
        .project {
            background-color: #d1d5db; /* 카드 색 더 진하게 */
            border: 1px solid #9ca3af;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .project:hover {
            transform: translateY(-4px);
            border-color: #6b7280;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
        }

        /* 작품 제목 */
        .project-title {
            margin-top: 0;
            margin-bottom: 16px;
            color: #111827;
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.5;
            border-bottom: 2px solid #9ca3af;
            padding-bottom: 12px;
        }

        /* p5.js 작품 표시 */
        iframe {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 10px;
            background-color: #ffffff;
        }

        /* 모바일 */
        @media (max-width: 900px) {
            #projects {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>나의 p5.js 다양한 작품</h1>
        <p>인터랙티브 아트 및 정적/동적 그래픽 과제 수행 결과물입니다.</p>
    </header>

    <section id="projects">

        <div class="project">
            <div class="project-title">과제 1 : 정적 작품 (프로젝트 1)</div>
            <iframe src="sample1/index.html"></iframe>
        </div>

        <div class="project">
            <div class="project-title">과제 4 : 동적 작품 (프로젝트 4)</div>
            <iframe src="sample4/index.html"></iframe>
        </div>

        <div class="project">
            <div class="project-title">과제 2 : 정적 작품 (프로젝트 2)</div>
            <iframe src="sample2/index.html"></iframe>
        </div>

        <div class="project">
            <div class="project-title">과제 3 : 동적 작품 (프로젝트 3)</div>
            <iframe src="sample3/index.html"></iframe>
        </div>

    </section>

</body>
</html>
