<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js 작품 모음</title>
    <style>
        /* 심미성을 극대화한 세련된 남색(Navy/Midnight Blue) 테마 */
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #0a1128; /* 깊은 남색 배경 */
            color: #e2e8f0; /* 부드러운 밝은 회색 글씨 */
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 45px;
        }

        header h1 {
            color: #38bdf8; /* 화사한 스카이 블루 포인트 컬러 */
            font-size: 2.6rem;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            color: #94a3b8; /* 차분한 톤의 설명 글씨 */
            font-size: 1.1rem;
            margin: 0;
        }

        /* 요구사항: 2행 2열 그리드 구조 */
        #projects {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 32px;
            max-width: 1200px;
            width: 100%;
        }

        /* 카드 디자인 감각적인 남색 레이어로 변경 */
        .project {
            background-color: #111a36; /* 밝은 남색 카드 배경 */
            border: 1px solid #1e295d; /* 세련된 네이비 테두리 */
            border-radius: 16px; /* 부드러운 라운딩 처리 */
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(2, 6, 23, 0.5); /* 은은한 그림자 */
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        /* 마우스를 올렸을 때 살짝 뜨는 효과로 심미성 추가 */
        .project:hover {
            transform: translateY(-4px);
            border-color: #38bdf8;
        }

        /* 과제 제목 및 설명 텍스트 스타일 */
        .project-title {
            margin-top: 0;
            margin-bottom: 16px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.5;
            border-bottom: 2px solid #1e295d;
            padding-bottom: 12px;
        }

        /* 링크 스타일 제거 */
        .project a {
            text-decoration: none;
            color: inherit;
            cursor: default;
        }

        /* 0점 방지: 클릭하지 않아도 화면에 바로 보이도록 iframe 배치 */
        iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 10px;
            background-color: #ffffff; /* p5.js 캔버스 가시성을 위해 내부는 흰색 유지 */
        }
    </style>
</head>
<body>

    <header>
        <h1>나의 p5.js 다양한 작품</h1>
        <p>인터랙티브 아트 및 정적/동적 그래픽 과제 수행 결과물입니다.</p>
    </header>

    <section id="projects">
        
        <div class="project">
            <div class="project-title">과제 1 : 정적 작품 (프로젝트 1)</div>
            <iframe src="sample1/index.html"></iframe>
        </div>

        <div class="project">
            <div class="project-title">과제 4 : 동적 작품 (프로젝트 4)</div>
            <iframe src="sample4/index.html"></iframe>
        </div>

        <div class="project">
            <div class="project-title">과제 2 : 정적 작품 (프로젝트 2)</div>
            <iframe src="sample2/index.html"></iframe>
        </div>

        <div class="project">
            <div class="project-title">과제 3 : 동적 작품 (프로젝트 3)</div>
            <iframe src="sample3/index.html"></iframe>
        </div>

    </section>

</body>
</html>
